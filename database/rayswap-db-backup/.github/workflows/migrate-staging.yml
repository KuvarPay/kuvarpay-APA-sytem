name: Migrate Staging Database

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  migrate-staging:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if DATABASE_URL_STAGING secret exists
        id: check-secret
        run: |
          if [ -z "${{ secrets.DATABASE_URL_STAGING }}" ]; then
            echo "⚠️ DATABASE_URL_STAGING secret not found. Skipping migrations."
            echo "secret-exists=false" >> $GITHUB_OUTPUT
          else
            echo "✅ DATABASE_URL_STAGING secret found."
            echo "secret-exists=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.check-secret.outputs.secret-exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        if: steps.check-secret.outputs.secret-exists == 'true'
        run: npm ci

      - name: Scan for destructive migrations
        if: steps.check-secret.outputs.secret-exists == 'true'
        id: scan-migrations
        run: |
          echo "🔍 Scanning SQL migrations for destructive commands..."
          
          # Get changed files in migrations directory
          CHANGED_MIGRATIONS=$(git diff --name-only HEAD~1 HEAD -- 'drizzle/migrations/*.sql' || echo "")
          
          if [ -z "$CHANGED_MIGRATIONS" ]; then
            echo "No SQL migration changes detected."
            echo "destructive-found=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "Changed migrations: $CHANGED_MIGRATIONS"
          
          # Check for destructive commands
          DESTRUCTIVE_PATTERNS="DROP|TRUNCATE|ALTER TYPE"
          DESTRUCTIVE_FOUND=false
          
          for file in $CHANGED_MIGRATIONS; do
            if [ -f "$file" ]; then
              echo "Checking $file..."
              if grep -iE "$DESTRUCTIVE_PATTERNS" "$file"; then
                echo "⚠️ Destructive command found in $file"
                DESTRUCTIVE_FOUND=true
              fi
            fi
          done
          
          if [ "$DESTRUCTIVE_FOUND" = true ]; then
            if [ "${{ vars.ALLOW_DESTRUCTIVE }}" = "true" ]; then
              echo "✅ Destructive commands found but ALLOW_DESTRUCTIVE is true. Proceeding."
              echo "destructive-found=false" >> $GITHUB_OUTPUT
            else
              echo "❌ Destructive commands found and ALLOW_DESTRUCTIVE is not true. Skipping migrations for safety."
              echo "destructive-found=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "✅ No destructive commands found."
            echo "destructive-found=false" >> $GITHUB_OUTPUT
          fi

      - name: Run database migrations
        if: steps.check-secret.outputs.secret-exists == 'true' && steps.scan-migrations.outputs.destructive-found == 'false'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_STAGING }}
        run: |
          echo "🚀 Running database migrations..."
          npm run db:migrate
          echo "✅ Migrations completed successfully."

      - name: Skip migrations - No secret
        if: steps.check-secret.outputs.secret-exists == 'false'
        run: |
          echo "ℹ️ Skipping migrations: DATABASE_URL_STAGING secret not configured."
          echo "This is expected for forks and development environments."

      - name: Skip migrations - Destructive commands
        if: steps.check-secret.outputs.secret-exists == 'true' && steps.scan-migrations.outputs.destructive-found == 'true'
        run: |
          echo "ℹ️ Skipping migrations: Destructive commands detected in SQL files."
          echo "Set ALLOW_DESTRUCTIVE repository variable to 'true' to override this safety check."
          echo "Destructive commands include: DROP, TRUNCATE, ALTER TYPE"